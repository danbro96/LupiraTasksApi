# Reference Compose for LupiraTasksApi. Every host, port, and URL below is an overridable
# ${VAR:-default} sample from the maintainer's deployment — override them for your environment.
# Values marked :?required must be set.
services:
  lupira-tasks-api:
    image: danbro96/lupira-tasks-api:${IMAGE_TAG:-latest}
    container_name: lupira-tasks-api
    environment:
      ConnectionStrings__tasks: "Host=postgres;Port=5432;Database=lupira_tasks;Username=lupira_tasks_user;Password=${LUPIRA_TASKS_DB_PASSWORD:?required}"

      Auth__Oidc__Authority: ${AUTH_AUTHORITY:-https://auth.lupira.com/application/o/tasks/}
      Auth__Oidc__Audience: ${AUTH_AUDIENCE:-lupira-tasks}

      RateLimit__RequestsPerMinute: ${RATE_LIMIT:-120}

      # Public base of the share web client; returned share links are {base}/s/{token}.
      Share__LinkBaseUrl: ${SHARE_LINK_BASE_URL:-https://tasks.lupira.com}

      # /dav-backend auth — a valid token for this API additionally minted by the DAV gateway's
      # client-credentials identity (azp). LAN-only surface; not routed through the tunnel.
      DavGateway__ClientId: ${DAV_GATEWAY_CLIENT_ID:-lupira-dav-svc}

      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-300000}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=prod}
    ports:
      # The agent MCP surface (/mcp) and the DAV-backend seam (/dav-backend) are served on this
      # same port. Keep them off the public internet: do NOT route /mcp* or /dav-backend* through
      # your public ingress (the app also rejects requests bearing CDN edge headers as a backstop).
      # REST stays public.
      - "${HOST_PORT:-40980}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/readyz || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - default
      - medelynas_data
      - medelynas_telemetry

networks:
  default:
    driver: bridge
  medelynas_data:
    external: true
    name: medelynas_data
  medelynas_telemetry:
    external: true
    name: medelynas_telemetry
