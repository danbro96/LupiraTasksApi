name: Tests

on:
  workflow_call:
    inputs:
      run_integration:
        description: Also run the Docker-backed integration tests
        type: boolean
        default: false

env:
  SOLUTION: LupiraTasksApi.slnx
  INTEGRATION_PROJECT: tests/LupiraTasksApi.IntegrationTests

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet test ${{ env.SOLUTION }} -c Release --logger "trx;LogFileName=unit.trx"

  integration:
    name: Integration tests
    if: ${{ inputs.run_integration }}
    runs-on: ubuntu-latest   # Docker preinstalled — Testcontainers spins up Postgres
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet test ${{ env.INTEGRATION_PROJECT }} -c Release --logger "trx;LogFileName=integration.trx"
