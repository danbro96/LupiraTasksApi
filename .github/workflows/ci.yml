name: ci

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_call:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore LupiraTasksApi.slnx
      - run: dotnet build LupiraTasksApi.slnx --no-restore -c Release
